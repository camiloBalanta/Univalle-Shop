services:
  search-service:
    environment:
      - MONGO_URI=${SEARCH_MONGO_URI:?SEARCH_MONGO_URI is required}
      - MONGO_DB_NAME=${SEARCH_MONGO_DB_NAME:-microsearch}

  catalog-service:
    environment:
      - MONGO_URI=${CATALOG_MONGO_URI:?CATALOG_MONGO_URI is required}

  payment-service:
    environment:
      - MONGO_URI=${PAYMENT_MONGO_URI:?PAYMENT_MONGO_URI is required}
      - MONGO_DB_NAME=${PAYMENT_MONGO_DB_NAME:-pagos}
      - ORDERS_SERVICE_HOST_PORT=${ORDERS_SERVICE_URL:-http://orders-service:3004}
      - USERS_SERVICE_URL=${USERS_SERVICE_URL:-http://users-service:3000}

  orders-service:
    environment:
      - MONGO_URI=${ORDERS_MONGO_URI:?ORDERS_MONGO_URI is required}
      - MONGO_DB_NAME=${ORDERS_MONGO_DB_NAME:-pedidos}
      - CATALOG_SERVICE_URL=${CATALOG_SERVICE_URL:-http://catalog-service:3000}

  users-service:
    environment:
      - MONGO_URI=${USERS_MONGO_URI:?USERS_MONGO_URI is required}
      - MONGODB_URI=${USERS_MONGODB_URI:-${USERS_MONGO_URI}}

  recommendation-service:
    environment:
      - MONGO_URI=${RECOMMENDATION_MONGO_URI:?RECOMMENDATION_MONGO_URI is required}
