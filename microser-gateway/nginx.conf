upstream search_service {
  server search-service:3001;
}

upstream catalog_service {
  server catalog-service:3000;
}

upstream payment_service {
  server payment-service:3000;
}

upstream orders_service {
  server orders-service:3004;
}

upstream users_service {
  server users-service:3000;
}

upstream recommendation_service {
  server recommendation-service:3000;
}

server {
  listen 3000;
  server_name localhost;

  add_header 'Access-Control-Allow-Origin' '*' always;
  add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE, PUT' always;
  add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type' always;
  add_header 'Access-Control-Allow-Credentials' 'true' always;

  if ($request_method = OPTIONS) {
    return 204;
  }

  location /search {
    proxy_pass http://search_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location /catalog {
    rewrite ^/catalog/(.*)$ /$1 break;
    proxy_pass http://catalog_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location /payment {
    rewrite ^/payment/(.*)$ /payments/$1 break;
    proxy_pass http://payment_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location /cart {
    proxy_pass http://orders_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location /orders {
    proxy_pass http://orders_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location /auth {
    rewrite ^/auth/?(.*)$ /api/auth/$1 break;
    proxy_pass http://users_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location /users {
    rewrite ^/users/?(.*)$ /api/usuarios/$1 break;
    proxy_pass http://users_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location /recommendation {
    rewrite ^/recommendation/(.*)$ /recommendations/$1 break;
    proxy_pass http://recommendation_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location = /health {
    default_type text/plain;
    return 200 'api-gateway healthy';
  }

  location / {
    default_type text/plain;
    return 200 'UnivalleShop API Gateway';
  }
}
