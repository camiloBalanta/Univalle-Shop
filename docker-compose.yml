x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Búsqueda Microservice
  search-service:
    build:
      context: ./microser-busquedad
      dockerfile: Dockerfile
    container_name: ms-busqueda-api
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${SEARCH_SERVICE_PORT:-3001}
      - MONGO_URI=${SEARCH_MONGO_URI}
      - MONGO_DB_NAME=${SEARCH_MONGO_DB_NAME:-Busquedad}
    networks:
      - univalle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

  # Catálogo Microservice
  catalog-service:
    build:
      context: ./microser-catalogo
      dockerfile: Dockerfile
    container_name: ms-catalogo-api
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${CATALOG_SERVICE_PORT:-3000}
      - MONGO_URI=${CATALOG_MONGO_URI}
      - MONGODB_URI=${CATALOG_MONGO_URI}
    networks:
      - univalle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/products', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

  catalog-mongo:
  payment-service:
    build:
      context: ./microser-pagos
      dockerfile: Dockerfile
    container_name: ms-pagos-api
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PAYMENT_SERVICE_PORT:-3000}
    networks:
      - univalle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./microser-pagos/logs:/app/logs
    logging: *default-logging

  # Pedidos Microservice
  orders-service:
    build:
      context: ./microser-pedidos
      dockerfile: Dockerfile
    container_name: ms-pedidos-api
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${ORDERS_SERVICE_PORT:-3004}
      - MONGO_URI=${ORDERS_MONGO_URI}
      - MONGO_DB_NAME=${ORDERS_MONGO_DB_NAME:-pedidos}
    networks:
      - univalle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3004/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

  # Usuarios Microservice
  users-service:
    build:
      context: ./microser-usuarios
      dockerfile: Dockerfile
    container_name: ms-usuarios-api
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${USERS_SERVICE_PORT:-3000}
      - MONGO_URI=${USERS_MONGO_URI}
      - MONGODB_URI=${USERS_MONGODB_URI}
      - MONGO_DB_NAME=${USERS_MONGO_DB_NAME:-usuarios}
    networks:
      - univalle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

  # Recomendación Microservice
  recommendation-service:
    build:
      context: ./microser-recomendacion_
      dockerfile: Dockerfile
    container_name: ms-recomendacion-api
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${RECOMMENDATION_SERVICE_PORT:-3000}
      - MONGO_URI=${RECOMMENDATION_MONGO_URI}
      - MONGO_DB_NAME=${RECOMMENDATION_MONGO_DB_NAME:-recommendation}
    networks:
      - univalle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

  gateway-service:
    build:
      context: ./microser-gateway
      dockerfile: Dockerfile
    container_name: ms-gateway-api
    ports:
      - '${GATEWAY_SERVICE_HOST_PORT:-3005}:${GATEWAY_SERVICE_PORT:-3000}'
    depends_on:
      - search-service
      - catalog-service
      - payment-service
      - orders-service
      - users-service
      - recommendation-service
    networks:
      - univalle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

  frontend-service:
    build:
      context: ./microser-frontend
      dockerfile: Dockerfile
    container_name: ms-pedidos-frontend
    ports:
      - '${FRONTEND_HOST_PORT:-5173}:80'
    depends_on:
      - gateway-service
    networks:
      - univalle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

volumes: {}
